version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accessibility-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/accessibility_db
      - DATABASE_ASYNC_URL=postgresql+asyncpg://postgres:postgres@db:5432/accessibility_db
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=true
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
      - ./scripts:/docker-entrypoint-initdb.d
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - accessibility-network
    restart: unless-stopped
    command: >
      sh -c "/docker-entrypoint-initdb.d/init-db.sh && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Celery Worker for async task processing
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accessibility-celery-worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/accessibility_db
      - DATABASE_ASYNC_URL=postgresql+asyncpg://postgres:postgres@db:5432/accessibility_db
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - accessibility-network
    restart: unless-stopped
    command: >
      sh -c "chmod +x /app/scripts/start_celery_worker.sh && /app/scripts/start_celery_worker.sh"

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accessibility-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_API_URL_EXTERNAL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - accessibility-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg16
    container_name: accessibility-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=accessibility_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accessibility-network
    restart: unless-stopped

  # Redis for caching and message queue
  redis:
    image: redis:7-alpine
    container_name: accessibility-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - accessibility-network
    restart: unless-stopped

  # Ollama for open-source LLMs
  ollama:
    image: ollama/ollama:latest
    container_name: accessibility-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment below if you have GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - accessibility-network
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: accessibility-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - accessibility-network
    restart: unless-stopped
    depends_on:
      - backend

  # Grafana for visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: accessibility-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - accessibility-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  backend_storage:
  prometheus_data:
  grafana_data:

networks:
  accessibility-network:
    driver: bridge
